<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Observatory — 10D Sniper Vision V5.6</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--border:rgba(255,255,255,0.07);--bh:rgba(255,255,255,0.12);--green:#10b981;--amber:#f59e0b;--red:#ef4444;--t1:#fff;--t2:#94a3b8;--t3:#475569;--primary:#10b981}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;overflow:hidden}

/* Global HUD */
.global-hud{height:64px;background:rgba(0,0,0,0.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:24px;backdrop-filter:blur(20px);z-index:100;position:relative}
.hud-item{display:flex;flex-direction:column;gap:2px;min-width:80px}
.hud-label{font-size:8px;font-weight:900;color:var(--t3);text-transform:uppercase;letter-spacing:.2em}
.hud-val{font-size:13px;font-weight:900;font-family:'JetBrains Mono',monospace;letter-spacing:-0.03em}
.hud-sep{width:1px;height:24px;background:var(--border)}

.layout{display:grid;grid-template-columns:200px 1fr;height:calc(100vh - 64px)}

/* Sidebar */
.sidebar{background:rgba(0,0,0,0.8);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-search{padding:12px;border-bottom:1px solid var(--border)}
.sb-search input{width:100%;padding:8px 12px 8px 32px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-size:11px;font-family:'JetBrains Mono',monospace;outline:none}
.pair-list{flex:1;overflow-y:auto;padding:4px}
.pair-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;cursor:pointer;transition:.15s;margin-bottom:2px}
.pair-item:hover{background:rgba(255,255,255,0.04)}
.pair-item.active{background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.2)}
.pair-name{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}

/* Main Content */
.main{display:flex;flex-direction:column;overflow:hidden}
.pair-bar{height:40px;background:rgba(255,255,255,0.01);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sym-name{font-size:14px;font-weight:900;font-family:'JetBrains Mono',monospace}

/* Chart Stack - Nuclear VH units to guarantee visibility */
.main{display:flex;flex-direction:column;overflow-y:auto;background:var(--bg)} /* Enable Scroll */
.pair-bar{height:40px;flex-shrink:0;background:rgba(0,0,0,0.4)}
.chart-stack{display:block;background:#050505;width:100%} 
.pane{position:relative;width:100%;border-bottom:1px solid var(--border);display:block}
#price-pane{height:52vh;min-height:400px}
#volume-pane{height:20vh;min-height:150px}
#rsi-pane{height:20vh;min-height:150px;border-bottom:none}
.pane > div:last-child { width: 100%; height: 100%; } 
.pane-label{position:absolute;top:8px;left:12px;z-index:20;font-size:8px;font-weight:900;color:var(--t3);text-transform:uppercase;background:rgba(0,0,0,0.6);padding:2px 6px;border-radius:4px;pointer-events:none}

.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg);z-index:200}
.loading.hidden{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.05);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.badge{font-size:8px;font-weight:900;padding:2px 6px;border-radius:4px;text-transform:uppercase}
.bx{background:rgba(239,68,68,0.1);color:var(--red);border:1px solid rgba(239,68,68,0.2)}
.bs{background:rgba(16,185,129,0.1);color:var(--green);border:1px solid rgba(16,185,129,0.2)}

.btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--t2);cursor:pointer;font-size:9px;font-weight:800;text-transform:uppercase;transition:.15s}
.btn-green{background:rgba(16,185,129,0.1);border-color:rgba(16,185,129,0.2);color:var(--green)}

/* Premium Boot Loader (V5.6 RELOADED) */
.loading {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 1000;
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.loading.hidden { opacity: 0; pointer-events: none; }

.boot-logo-container {
    position: relative;
    width: 140px;
    height: 140px;
    margin-bottom: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
}
.boot-logo {
    width: 70px;
    height: 70px;
    z-index: 10;
    filter: drop-shadow(0 0 20px rgba(16,185,129, 0.4));
    animation: logo-pulse 2s infinite ease-in-out;
}
.boot-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 1px solid rgba(16,185,129, 0.15);
    border-radius: 50%;
    animation: ring-expand 3s infinite linear;
}
.boot-ring:nth-child(2) { animation-delay: 1s; }
.boot-ring:nth-child(3) { animation-delay: 2s; }

.asset-grid {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
    margin-top: 20px;
}
.asset-dot {
    width: 4px;
    height: 4px;
    background: rgba(255,255,255,0.05);
    border-radius: 1px;
}
.asset-dot.active {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: dot-flicker 2s infinite;
}

.candle-loader {
    width: 12px;
    height: 24px;
    border: 1.5px solid var(--t2);
    position: relative;
    margin-bottom: 12px;
}
.candle-loader::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 1.5px;
    height: 8px;
    background: var(--t2);
}
.candle-loader::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 50%;
    transform: translateX(-50%);
    width: 1.5px;
    height: 8px;
    background: var(--t2);
}
.candle-animate {
    animation: candle-move 1.5s infinite ease-in-out;
}

@keyframes logo-pulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
@keyframes ring-expand { 0% { transform: scale(0.6); opacity: 0.8; } 100% { transform: scale(1.6); opacity: 0; } }
@keyframes dot-flicker { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
@keyframes candle-move { 0%, 100% { transform: translateY(0); border-color: var(--green); } 50% { transform: translateY(-10px); border-color: var(--red); } }

.loading-txt {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 800;
    color: var(--t2);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-top: 15px;
}
</style>
</head>
<body>

<header class="global-hud">
    <div class="hud-item" style="margin-right:16px">
        <div class="hud-label">Sovereign Intel</div>
        <div class="hud-val" style="color:var(--green)">V5.6 RELOADED</div>
    </div>
    <div class="hud-sep"></div>
    <div class="hud-item"><div class="hud-label">BTC / USD</div><div class="hud-val" id="btcP">0.00</div></div>
    <div class="hud-item"><div class="hud-label">VAR 1H</div><div class="hud-val" id="btcV">0.00%</div></div>
    <div class="hud-sep"></div>
    <div class="hud-item"><div class="hud-label">ADX</div><div class="hud-val" id="btcA" style="color:var(--amber)">0.0</div></div>
    <div class="hud-item"><div class="hud-label">CVD</div><div class="hud-val" id="btcC">0.0</div></div>
    <div class="hud-sep"></div>
    <div class="hud-item"><div class="hud-label">DOM %</div><div class="hud-val" id="btcD">0.00%</div></div>
    <div class="hud-item"><div class="hud-label">DECORR</div><div class="hud-val" id="btcl">0%</div></div>
    <div class="hud-sep"></div>
    <div class="hud-item"><div class="hud-label">MASTER DIR</div><div class="hud-val" id="btcm">—</div></div>
</header>

<div class="layout">
  <aside class="sidebar">
    <div class="sb-search"><input type="text" id="searchInput" placeholder="BUSCAR..." oninput="filterPairs(this.value)"></div>
    <div class="pair-list" id="pairList"></div>
  </aside>

  <main class="main">
    <div class="pair-bar">
      <div style="display:flex;align-items:center;gap:15px">
        <span class="sym-name" id="symDisplay">—</span>
        <span id="profBadge" class="badge bs">STABLE</span>
        <div class="hud-sep" style="height:16px"></div>
        <!-- Strategy Selector -->
        <div style="display:flex;align-items:center;gap:8px" id="strategySelector">
          <label class="btn" style="padding:4px 8px; font-size:8px">
            <input type="checkbox" id="toggle-123" checked onchange="refreshLayers()"> 1-2-3
          </label>
          <label class="btn" style="padding:4px 8px; font-size:8px">
            <input type="checkbox" id="toggle-smc" checked onchange="refreshLayers()"> SMC (OB/FVG)
          </label>
          <label class="btn" style="padding:4px 8px; font-size:8px">
            <input type="checkbox" id="toggle-trend" checked onchange="refreshLayers()"> TENDÊNCIA
          </label>
        </div>
      </div>
      <button class="btn btn-green" onclick="capture()" id="capBtn">
        <span class="material-icons-round">photo_camera</span>Capturar Visão
      </button>
    </div>

    <div class="chart-stack">
      <div class="loading" id="loading">
        <div class="boot-logo-container">
          <div class="boot-ring"></div>
          <div class="boot-ring"></div>
          <div class="boot-ring"></div>
          <img src="logo10DTrasp.png" class="boot-logo" alt="10D">
        </div>
        
        <div class="candle-loader candle-animate"></div>
        
        <div class="loading-txt">Sincronizando 40 Ativos de Elite...</div>
        
        <div class="asset-grid" id="assetGrid">
          <!-- 40 dots injected via JS -->
        </div>
      </div>
      <div class="pane" id="price-pane"><div class="pane-label">Price Action</div><div id="price-chart" style="width:100%;height:100%"></div></div>
      <div class="pane" id="volume-pane"><div class="pane-label">Volume Flow</div><div id="volume-chart" style="width:100%;height:100%"></div></div>
      <div class="pane" id="rsi-pane"><div class="pane-label">RSI (14)</div><div id="rsi-chart" style="width:100%;height:100%"></div></div>
    </div>
  </main>
</div>

<script src="vendor/lightweight-charts.standalone.production.js"></script>
<script>
const MATRIX = {
  "AVAXUSDT":{p:"EXTREME"},"NEARUSDT":{p:"VOLATILE"},"APTUSDT":{p:"EXTREME"},"SUIUSDT":{p:"EXTREME"},
  "OPUSDT":{p:"VOLATILE"},"ARBUSDT":{p:"VOLATILE"},"RENDERUSDT":{p:"EXTREME"},"FETUSDT":{p:"EXTREME"},
  "INJUSDT":{p:"VOLATILE"},"TIAUSDT":{p:"EXTREME"},"LINKUSDT":{p:"STABLE"},"DOTUSDT":{p:"STABLE"},
  "ADAUSDT":{p:"STABLE"},"POLUSDT":{p:"STABLE"},"ATOMUSDT":{p:"STABLE"},"LTCUSDT":{p:"STABLE"},
  "BCHUSDT":{p:"VOLATILE"},"XLMUSDT":{p:"STABLE"},"XRPUSDT":{p:"STABLE"},"TRXUSDT":{p:"STABLE"},
  "ALGOUSDT":{p:"STABLE"},"ETCUSDT":{p:"STABLE"},"FILUSDT":{p:"VOLATILE"},"STXUSDT":{p:"VOLATILE"},
  "ICPUSDT":{p:"VOLATILE"},"HBARUSDT":{p:"STABLE"},"KASUSDT":{p:"EXTREME"},"LDOUSDT":{p:"VOLATILE"},
  "AAVEUSDT":{p:"VOLATILE"},"RUNEUSDT":{p:"EXTREME"},"GRTUSDT":{p:"VOLATILE"},"EGLDUSDT":{p:"STABLE"},
  "SANDUSDT":{p:"VOLATILE"},"MANAUSDT":{p:"VOLATILE"},"THETAUSDT":{p:"STABLE"},"VETUSDT":{p:"STABLE"},
  "EOSUSDT":{p:"STABLE"},"CHZUSDT":{p:"STABLE"},"FTMUSDT":{p:"VOLATILE"},"UNIUSDT":{p:"STABLE"}
};

let cur = null;
let curStudy = null;
let charts = { price: null, volume: null, rsi: null };
let series = { candle: null, sma21: null, sma100: null, st: null, vol: null, rsi: null };
let obLines = [];
let isSyncing = false;

const calculateSMA = (d, p) => { let s = []; for (let i = 0; i < d.length; i++) { if (i < p - 1) continue; let sum = 0; for (let j = 0; j < p; j++) sum += d[i - j].close; s.push({ time: d[i].time, value: sum / p }); } return s; };
const calculateRSI = (d, p = 14) => { let r = []; if (d.length < p) return r; let g = 0, l = 0; for (let i = 1; i <= p; i++) { let diff = d[i].close - d[i-1].close; if (diff > 0) g += diff; else l -= diff; } let ag = g/p, al = l/p; r.push({ time: d[p].time, value: 100 - (100/(1+ag/al)) }); for (let i = p + 1; i < d.length; i++) { let diff = d[i].close - d[i-1].close; ag = (ag * (p-1) + (diff > 0 ? diff : 0)) / p; al = (al * (p-1) + (diff < 0 ? -diff : 0)) / p; r.push({ time: d[i].time, value: 100 - (100/(1+ag/al)) }); } return r; };
const calculateST = (d, p, m) => { const tr = (c, pr) => !pr ? c.high - c.low : Math.max(c.high - c.low, Math.abs(c.high - pr.close), Math.abs(c.low - pr.close)); let trs = d.map((c, i) => tr(c, d[i-1])); let atrs = []; let sum = 0; for (let i = 0; i < d.length; i++) { if (i < p) { sum += trs[i]; if (i === p-1) atrs[i] = sum/p; else atrs[i] = null; continue; } atrs[i] = (atrs[i-1] * (p-1) + trs[i]) / p; } let st = []; let pU = null, pL = null, t = 1; for (let i = 0; i < d.length; i++) { if (!atrs[i]) continue; let src = (d[i].high + d[i].low) / 2, u = src + m*atrs[i], l = src - m*atrs[i]; if (pU !== null) { u = (u < pU || d[i-1].close > pU) ? u : pU; l = (l > pL || d[i-1].close < pL) ? l : pL; } if (i > 0 && st.length > 0) { if (t === 1 && d[i].close < l) t = -1; else if (t === -1 && d[i].close > u) t = 1; } st.push({ time: d[i].time, value: t === 1 ? l : u, trend: t }); pU = u; pL = l; } return st; };

async function syncBTC() {
  try {
    const r = await fetch('/api/system/state?v=' + Date.now());
    if (!r.ok) return;
    const d = await r.json();
    document.getElementById('btcP').textContent = d.btc_price.toLocaleString('en-US', {style:'currency', currency:'USD'});
    const v = d.btc_variation_1h || 0;
    document.getElementById('btcV').textContent = (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
    document.getElementById('btcV').style.color = v >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('btcA').textContent = (d.btc_adx || 0).toFixed(1);
    document.getElementById('btcC').textContent = (d.btc_cvd || 0).toFixed(0);
    document.getElementById('btcC').style.color = d.btc_cvd >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('btcl').textContent = (d.decorrelation_avg || 0).toFixed(0) + '%';
    document.getElementById('btcD').textContent = (d.btc_dominance || 0).toFixed(2) + '%';
    document.getElementById('btcm').textContent = (d.btc_direction || 'LATERAL');
    document.getElementById('btcm').style.color = d.btc_direction === 'UP' ? 'var(--green)' : d.btc_direction === 'DOWN' ? 'var(--red)' : 'var(--t2)';
  } catch(e) {}
}

function initCharts() {
  const common = {
    layout: { background: { color: '#050505' }, textColor: '#94a3b8', fontFamily: 'Inter', fontSize: 11 },
    grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    timeScale: { borderColor: 'rgba(255,255,255,0.08)', timeVisible: true }
  };

  charts.price = LightweightCharts.createChart(document.getElementById('price-chart'), { ...common, timeScale: { ...common.timeScale, visible: false } });
  charts.volume = LightweightCharts.createChart(document.getElementById('volume-chart'), { ...common, timeScale: { ...common.timeScale, visible: false } });
  charts.rsi = LightweightCharts.createChart(document.getElementById('rsi-chart'), common);

  series.candle = charts.price.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false, wickUpColor: '#10b981', wickDownColor: '#ef4444' });
  series.sma21 = charts.price.addLineSeries({ color: 'rgba(255,255,255,0.5)', lineWidth: 1, title: 'SMA 21' });
  series.sma100 = charts.price.addLineSeries({ color: 'rgba(245,158,11,0.5)', lineWidth: 1, title: 'SMA 100' });
  series.st = charts.price.addLineSeries({ color: 'rgba(16,185,129,0.3)', lineWidth: 1, lineStyle: 2 });
  series.vol = charts.volume.addHistogramSeries({ color: 'rgba(38,166,154,0.5)', priceFormat: { type: 'volume' } });
  series.rsi = charts.rsi.addLineSeries({ color: '#8b5cf6', lineWidth: 2 });
  charts.rsi.addLineSeries({ color: 'rgba(255,255,255,0.1)', lineWidth: 1, lineStyle: 2 }).setData([{time:0, value:70},{time:9999999999, value:70}]);
  charts.rsi.addLineSeries({ color: 'rgba(255,255,255,0.1)', lineWidth: 1, lineStyle: 2 }).setData([{time:0, value:30},{time:9999999999, value:30}]);

  const sync = (src, r) => { if (!r || isSyncing) return; isSyncing = true; Object.values(charts).forEach(c => { if(c && c !== src) try { c.timeScale().setVisibleRange(r); } catch(e){} }); isSyncing = false; };
  charts.price.timeScale().subscribeVisibleTimeRangeChange(r => sync(charts.price, r));
  charts.volume.timeScale().subscribeVisibleTimeRangeChange(r => sync(charts.volume, r));
  charts.rsi.timeScale().subscribeVisibleTimeRangeChange(r => sync(charts.rsi, r));
}

async function loadData(s) {
  document.getElementById('loading').classList.remove('hidden');
  try {
    const r = await fetch(`/api/market/study?symbol=${s}.P&interval=30&limit=400&v=` + Date.now());
    if (r.ok) {
      const study = await r.json();
      curStudy = study;
      const d = study.klines.map(x => ({ time: x[0]/1000, open: x[1], high: x[2], low: x[3], close: x[4], volume: x[5] }));
      series.candle.setData(d);
      if (document.getElementById('toggle-trend').checked) {
          series.sma21.setData(calculateSMA(d, 21));
          series.sma100.setData(calculateSMA(d, 100));
          const st = calculateST(d, 10, 3);
          series.st.setData(st.map(x => ({ time: x.time, value: x.value })));
      } else {
          series.sma21.setData([]); series.sma100.setData([]); series.st.setData([]);
      }
      refreshLayers();
      series.vol.setData(d.map(x => ({ time: x.time, value: x.volume, color: x.close >= x.open ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)' })));
      series.rsi.setData(calculateRSI(d));
      Object.values(charts).forEach(c => { const p = c.chartElement().parentElement; if (p) c.applyOptions({ width: p.clientWidth, height: p.clientHeight }); });
      charts.rsi.timeScale().fitContent();
    }
  } catch(e) {}
  document.getElementById('loading').classList.add('hidden');
}

function refreshLayers() {
  if (!curStudy) return;
  const d = curStudy.klines.map(x => ({ time: x[0]/1000, open: x[1], high: x[2], low: x[3], close: x[4] }));
  let m = [];
  obLines.forEach(l => series.candle.removePriceLine(l));
  obLines = [];
  if (document.getElementById('toggle-smc').checked) {
    (curStudy.obs || []).slice(-4).forEach(ob => {
        const color = ob.type === 'BULLISH' ? '#10b981' : '#ef4444';
        obLines.push(series.candle.createPriceLine({ price: ob.top, color: color + '88', lineWidth: 1, title: 'OB ' + ob.type[0] }));
        obLines.push(series.candle.createPriceLine({ price: ob.bottom, color: color + '44', lineWidth: 1, lineStyle: 2 }));
    });
  }
  if (document.getElementById('toggle-123').checked && (curStudy.patterns_123 || []).length > 0) {
    curStudy.patterns_123.forEach(p => {
        const color = p.side === 'buy' ? '#10b981' : '#ef4444';
        Object.entries(p.points).forEach(([num, data]) => {
            const t = d[data.idx]?.time;
            if (t) m.push({ time: t, position: p.side === 'buy' ? 'belowBar' : 'aboveBar', color: color, shape: 'circle', text: num });
        });
        if (p.trigger_price) obLines.push(series.candle.createPriceLine({ price: p.trigger_price, color: 'rgba(255,255,255,0.4)', lineWidth: 1, lineStyle: 3, title: 'STRIKE' }));
    });
  }
  if (document.getElementById('toggle-trend').checked) {
      const st = calculateST(d, 10, 3);
      for (let i = 1; i < st.length; i++) {
        if (st[i].trend === 1 && st[i-1].trend === -1) m.push({ time: st[i].time, position: 'belowBar', color: '#10b981', shape: 'arrowUp', text: 'ST+' });
        if (st[i].trend === -1 && st[i-1].trend === 1) m.push({ time: st[i].time, position: 'aboveBar', color: '#f59e0b', shape: 'arrowDown', text: 'ST-' });
      }
  }
  series.candle.setMarkers(m.sort((a,b) => a.time - b.time));
}

function select(s) {
  if (cur) document.getElementById('p-'+cur)?.classList.remove('active');
  cur = s; document.getElementById('p-'+s)?.classList.add('active');
  document.getElementById('symDisplay').textContent = s;
  const d = MATRIX[s] || {p:'STABLE'};
  document.getElementById('profBadge').className = 'badge ' + (d.p === 'EXTREME' ? 'bx' : 'bs');
  document.getElementById('profBadge').textContent = d.p;
  loadData(s);
}

function renderPairs(list) {
  const el = document.getElementById('pairList'); el.innerHTML = '';
  list.forEach(s => {
    const div = document.createElement('div'); div.className = 'pair-item' + (s === cur ? ' active' : '');
    div.id = 'p-'+s; div.onclick = () => select(s);
    div.innerHTML = `<span class="pair-name">${s.replace('USDT','')}</span><span class="badge ${MATRIX[s].p === 'EXTREME' ? 'bx' : 'bs'}">${MATRIX[s].p.substring(0,3)}</span>`;
    el.appendChild(div);
  });
}

function filterPairs(q) { renderPairs(Object.keys(MATRIX).filter(s => s.includes(q.toUpperCase()))); }

const ro = new ResizeObserver(() => {
    Object.entries(charts).forEach(([id, chart]) => {
        const container = document.getElementById(id + '-chart');
        if (chart && container) chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
    });
});
['price-pane', 'volume-pane', 'rsi-pane'].forEach(p => { const el = document.getElementById(p); if (el) ro.observe(el); });

async function capture() {
  const b = document.getElementById('capBtn'); b.disabled = true; b.textContent = 'CAPTURANDO...';
  await fetch('/api/vision/capture', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({symbol:cur, interval:'30'}) });
  setTimeout(() => { b.disabled = false; b.innerHTML = '<span class="material-icons-round">photo_camera</span>Capturar Visão'; }, 2000);
}

syncBTC(); setInterval(syncBTC, 5000);
initCharts();
renderPairs(Object.keys(MATRIX));

const grid = document.getElementById('assetGrid');
if (grid) { for (let i = 0; i < 40; i++) { const dot = document.createElement('div'); dot.className = 'asset-dot' + (Math.random() > 0.5 ? ' active' : ''); dot.style.animationDelay = (Math.random() * 2) + 's'; grid.appendChild(dot); } }

select('AVAXUSDT');
</script>
