<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Observatory — 10D Sniper Vision Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--border:rgba(255,255,255,0.07);--bh:rgba(255,255,255,0.15);--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--t1:#fff;--t2:#9ca3af;--t3:#4b5563;--primary:#22c55e}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;overflow:hidden}
.layout{display:grid;grid-template-columns:220px 1fr;height:100vh}

.sidebar{background:rgba(0,0,0,0.8);border-right:1px solid var(--border);display:flex;flex-direction:column;backdrop-filter:blur(20px)}
.sb-head{padding:16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:12px}
.sb-logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:10px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);display:flex;align-items:center;justify-content:center}
.logo-icon .material-icons-round{font-size:18px;color:var(--green)}
.logo-t{font-size:11px;font-weight:900;letter-spacing:.2em;text-transform:uppercase}
.logo-s{font-size:8px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.sb-search{position:relative}
.sb-search input{width:100%;padding:8px 10px 8px 32px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;color:var(--t1);font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;transition:.2s}
.sb-search input:focus{border-color:var(--bh);background:rgba(255,255,255,0.05)}
.sb-search .material-icons-round{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--t3)}

.pair-list{flex:1;overflow-y:auto;padding:8px}
.pair-list::-webkit-scrollbar{width:3px}
.pair-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}
.pair-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;cursor:pointer;transition:.15s;margin-bottom:4px;border:1px solid transparent}
.pair-item:hover{background:rgba(255,255,255,0.04);border-color:var(--border)}
.pair-item.active{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.3);box-shadow:0 0 20px rgba(34,197,94,0.05)}
.pair-name{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.badge{font-size:8px;font-weight:800;padding:3px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em}
.bx{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.2)}
.bv{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.2)}
.bs{background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.2)}

.sb-foot{padding:12px 16px;border-top:1px solid var(--border);background:rgba(0,0,0,0.2)}
.status-dot{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:700}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:rgba(0,0,0,0.7);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(20px);z-index:20}
.sym-box{display:flex;align-items:center;gap:12px}
.sym{font-size:16px;font-weight:900;font-family:'JetBrains Mono',monospace;letter-spacing:-0.02em}
.tf-badge{font-size:9px;font-weight:800;padding:3px 8px;border-radius:6px;background:rgba(255,255,255,0.05);color:var(--t2);border:1px solid var(--border);text-transform:uppercase;letter-spacing:.1em}

.topbar-right{display:flex;align-items:center;gap:10px}
.btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--t2);cursor:pointer;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;transition:.15s}
.btn:hover{background:rgba(255,255,255,0.07);border-color:var(--bh);color:var(--t1)}
.btn .material-icons-round{font-size:14px}
.btn-green{background:rgba(34,197,94,0.12);border-color:rgba(34,197,94,0.3);color:var(--green)}
.btn-green:hover{background:rgba(34,197,94,0.2);transform:translateY(-1px);box-shadow:0 4px 15px rgba(34,197,94,0.15)}

.chart-area{flex:1;position:relative;overflow:hidden;background:#050505}
#tv_chart_container{position:absolute;top:0;left:0;right:0;bottom:0}

/* Telemetry Overlay */
.telemetry-overlay{position:absolute;top:20px;left:20px;z-index:50;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.tel-pill{background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);padding:6px 12px;border-radius:10px;display:flex;align-items:center;gap:8px}
.tel-label{font-size:8px;font-weight:900;color:var(--t3);text-transform:uppercase;letter-spacing:.1em}
.tel-val{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--t1)}

/* Ghost Legend */
.ghost-legend{position:absolute;bottom:20px;left:20px;z-index:50;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.08);padding:10px 15px;border-radius:12px;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.leg-item{display:flex;align-items:center;gap:8px;font-size:9px;font-weight:700;color:var(--t2)}
.leg-icon{width:8px;height:8px;border-radius:2px}

.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--bg);z-index:100;transition:opacity .5s}
.loading.hidden{opacity:0;pointer-events:none}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.05);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;font-weight:700;text-transform:uppercase;letter-spacing:.1em}

.infobar{height:40px;background:rgba(0,0,0,0.8);border-top:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:20px;flex-shrink:0;z-index:20}
.info-item{display:flex;align-items:center;gap:6px}
.info-label{font-size:8px;color:var(--t3);font-weight:900;text-transform:uppercase;letter-spacing:.15em}
.info-val{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}
.sep{width:1px;height:14px;background:var(--border)}
.scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(34,197,94,0.3),transparent);animation:scan 6s ease-in-out infinite;pointer-events:none;z-index:10}
@keyframes scan{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">
        <div class="logo-icon"><span class="material-icons-round">biotech</span></div>
        <div><div class="logo-t">10D Sniper</div><div class="logo-s">Vision Intel · V5.2</div></div>
      </div>
      <div class="sb-search">
        <span class="material-icons-round">search</span>
        <input type="text" id="searchInput" placeholder="BUSCAR ATIVO..." oninput="filterPairs(this.value)">
      </div>
    </div>
    <div class="pair-list" id="pairList"></div>
    <div class="sb-foot">
      <div class="status-dot"><div class="dot"></div><span id="statusTxt">40 PARES EM OBSERVAÇÃO</span></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="sym-box">
        <span class="sym" id="symDisplay">AVAXUSDT</span>
        <span class="tf-badge">30M · PERPETUAL</span>
        <span id="profBadge" class="badge bx" style="margin-left:4px">EXT</span>
      </div>
      <div class="topbar-right">
        <button class="btn" onclick="toggleIndicators()"><span class="material-icons-round">layers</span> Camadas</button>
        <button class="btn btn-green" onclick="capture()" id="capBtn">
          <span class="material-icons-round">photo_camera</span>Capturar Visão
        </button>
      </div>
    </div>

    <div class="chart-area" id="captureArea">
      <div class="scan-line"></div>
      
      <!-- Vision Assistance HUD -->
      <div class="telemetry-overlay">
        <div class="tel-pill"><span class="tel-label">RSI(14)</span><span class="tel-val" id="telRsi">—</span></div>
        <div class="tel-pill"><span class="tel-label">ADX(14)</span><span class="tel-val" id="telAdx">—</span></div>
        <div class="tel-pill"><span class="tel-label">TREND</span><span class="tel-val" id="telTrend">—</span></div>
      </div>

      <div class="ghost-legend">
        <div class="leg-item"><div class="leg-icon" style="background:#22c55e"></div> PONTO DE ENTRADA PERFEITO</div>
        <div class="leg-item"><div class="leg-icon" style="background:#f59e0b"></div> REJEIÇÃO / SAÍDA</div>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-txt" id="loadingTxt">Sincronizando Visão...</div>
      </div>
      <div id="tv_chart_container"></div>
    </div>

    <div class="infobar">
      <div class="info-item"><span class="info-label">Ativo</span><span class="info-val" id="infoSym">—</span></div>
      <div class="sep"></div>
      <div class="info-item"><span class="info-label">Perfil</span><span class="info-val" id="infoPerfil">—</span></div>
      <div class="sep"></div>
      <div class="info-item"><span class="info-label">Backtest</span><span class="info-val" id="infoWinrate" style="color:var(--green)">PROB: 78%</span></div>
      <div class="sep"></div>
      <div class="info-item"><span class="info-label">Status Vision</span><span class="info-val" id="infoVision" style="color:var(--t3)">READY</span></div>
    </div>
  </main>
</div>

<script src="vendor/lightweight-charts.standalone.production.js"></script>
<script>
const MATRIX = {
  "AVAXUSDT":{r:25,d:1.4,p:"EXTREME"},"NEARUSDT":{r:22,d:1.3,p:"VOLATILE"},
  "APTUSDT":{r:25,d:1.4,p:"EXTREME"},"SUIUSDT":{r:25,d:1.4,p:"EXTREME"},
  "OPUSDT":{r:22,d:1.3,p:"VOLATILE"},"ARBUSDT":{r:20,d:1.2,p:"VOLATILE"},
  "RENDERUSDT":{r:25,d:1.5,p:"EXTREME"},"FETUSDT":{r:25,d:1.5,p:"EXTREME"},
  "INJUSDT":{r:22,d:1.3,p:"VOLATILE"},"TIAUSDT":{r:25,d:1.4,p:"EXTREME"},
  "LINKUSDT":{r:15,d:1.0,p:"STABLE"},"DOTUSDT":{r:12,d:1.0,p:"STABLE"},
  "ADAUSDT":{r:10,d:1.0,p:"STABLE"},"POLUSDT":{r:15,d:1.1,p:"STABLE"},
  "ATOMUSDT":{r:15,d:1.0,p:"STABLE"},"LTCUSDT":{r:10,d:1.0,p:"STABLE"},
  "BCHUSDT":{r:18,d:1.2,p:"VOLATILE"},"XLMUSDT":{r:10,d:1.0,p:"STABLE"},
  "XRPUSDT":{r:10,d:1.0,p:"STABLE"},"TRXUSDT":{r:8,d:1.0,p:"STABLE"},
  "ALGOUSDT":{r:10,d:1.0,p:"STABLE"},"ETCUSDT":{r:12,d:1.1,p:"STABLE"},
  "FILUSDT":{r:18,d:1.2,p:"VOLATILE"},"STXUSDT":{r:22,d:1.3,p:"VOLATILE"},
  "ICPUSDT":{r:20,d:1.2,p:"VOLATILE"},"HBARUSDT":{r:15,d:1.1,p:"STABLE"},
  "KASUSDT":{r:25,d:1.4,p:"EXTREME"},"LDOUSDT":{r:20,d:1.2,p:"VOLATILE"},
  "AAVEUSDT":{r:18,d:1.2,p:"VOLATILE"},"RUNEUSDT":{r:25,d:1.4,p:"EXTREME"},
  "GRTUSDT":{r:20,d:1.2,p:"VOLATILE"},"EGLDUSDT":{r:15,d:1.1,p:"STABLE"},
  "SANDUSDT":{r:18,d:1.2,p:"VOLATILE"},"MANAUSDT":{r:18,d:1.2,p:"VOLATILE"},
  "THETAUSDT":{r:15,d:1.1,p:"STABLE"},"VETUSDT":{r:12,d:1.0,p:"STABLE"},
  "EOSUSDT":{r:10,d:1.0,p:"STABLE"},"CHZUSDT":{r:15,d:1.1,p:"STABLE"},
  "FTMUSDT":{r:22,d:1.3,p:"VOLATILE"},"UNIUSDT":{r:15,d:1.1,p:"STABLE"}
};

let cur = null;
let chart = null;
let candlestickSeries = null;
let volumeSeries = null;
let sma21Series = null;
let sma100Series = null;
let superTrendSeries = null;

// --- Indicator Utilities ---
const calculateSMA = (data, period) => {
    if (!data || data.length < period) return [];
    let smas = [];
    for (let i = 0; i < data.length; i++) {
        if (i < period - 1) { smas.push(null); continue; }
        let sum = 0;
        for (let j = 0; j < period; j++) sum += data[i - j].close;
        smas.push({ time: data[i].time, value: sum / period });
    }
    return smas.filter(d => d !== null);
};

const calculateATR = (data, period) => {
    if (!data || data.length < period) return [];
    let trs = [];
    for (let i = 0; i < data.length; i++) {
        const c = data[i], p = data[i - 1];
        trs.push(!p ? c.high - c.low : Math.max(c.high - c.low, Math.abs(c.high - p.close), Math.abs(c.low - p.close)));
    }
    let atrs = []; let sum = 0;
    for (let i = 0; i < data.length; i++) {
        if (i < period) { sum += trs[i]; if (i === period - 1) atrs.push({ time: data[i].time, value: sum / period }); else atrs.push(null); continue; }
        atrs.push({ time: data[i].time, value: (atrs[i - 1].value * (period - 1) + trs[i]) / period });
    }
    return atrs;
};

const calculateSuperTrend = (data, period, multiplier) => {
    const atrs = calculateATR(data, period);
    if (atrs.length === 0) return [];
    let st = []; let prevU = null, prevL = null, trend = 1; 
    for (let i = 0; i < data.length; i++) {
        if (!atrs[i]) { st.push(null); continue; }
        const atr = atrs[i].value, src = (data[i].high + data[i].low) / 2;
        let u = src + multiplier * atr, l = src - multiplier * atr;
        if (prevU !== null) {
            u = (u < prevU || data[i - 1].close > prevU) ? u : prevU;
            l = (l > prevL || data[i - 1].close < prevL) ? l : prevL;
        }
        if (i > 0 && st[i-1]) {
            if (trend === 1 && data[i].close < l) trend = -1;
            else if (trend === -1 && data[i].close > u) trend = 1;
        }
        st.push({ time: data[i].time, value: trend === 1 ? l : u, trend });
        prevU = u; prevL = l;
    }
    return st;
};

const calculateRSI = (data, period = 14) => {
    if (data.length < period) return 50;
    let gains = 0, losses = 0;
    for (let i = 1; i <= period; i++) {
        const diff = data[i].close - data[i-1].close;
        if (diff > 0) gains += diff; else losses -= diff;
    }
    let avgGain = gains / period, avgLoss = losses / period;
    for (let i = period + 1; i < data.length; i++) {
        const diff = data[i].close - data[i-1].close;
        avgGain = (avgGain * (period - 1) + (diff > 0 ? diff : 0)) / period;
        avgLoss = (avgLoss * (period - 1) + (diff < 0 ? -diff : 0)) / period;
    }
    return 100 - (100 / (1 + avgGain / avgLoss));
};

// --- Vision Engine ---
function init(){
  const p = new URLSearchParams(location.search);
  const s = p.get('symbol')||p.get('s')||'AVAXUSDT';
  renderList(Object.keys(MATRIX));
  select(s.toUpperCase().replace('.P',''));
  
  window.addEventListener('resize', () => {
    if(chart) {
        const container = document.getElementById('tv_chart_container');
        chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
    }
  });
}

function select(s){
  if(cur){ const e=document.getElementById('p-'+cur); if(e)e.classList.remove('active'); }
  cur = s;
  const d = MATRIX[s]||{r:10,d:1.0,p:'STABLE'};
  const e = document.getElementById('p-'+s); if(e)e.classList.add('active');
  document.getElementById('symDisplay').textContent = s;
  document.getElementById('infoSym').textContent = s;
  document.getElementById('infoPerfil').textContent = d.p;
  loadChart(s);
}

async function loadChart(symbol){
  showLoading('Vision Intel: Analisando Ativo...');
  const container = document.getElementById('tv_chart_container');
  
  if (!chart) {
      chart = LightweightCharts.createChart(container, {
          layout: { background: { color: '#050505' }, textColor: '#94a3b8', fontFamily: 'JetBrains Mono', fontSize: 11 },
          grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
          crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
          priceScale: { borderColor: 'rgba(255,255,255,0.08)' },
          timeScale: { borderColor: 'rgba(255,255,255,0.08)', timeVisible: true },
      });
      candlestickSeries = chart.addCandlestickSeries({ upColor: '#22c55e', downColor: '#ef4444', borderVisible: false, wickUpColor: '#22c55e', wickDownColor: '#ef4444' });
      volumeSeries = chart.addHistogramSeries({ color: 'rgba(38, 166, 154, 0.3)', priceFormat: { type: 'volume' }, priceScaleId: '' });
      volumeSeries.priceScale().applyOptions({ scaleMargins: { top: 0.85, bottom: 0 } });
      sma21Series = chart.addLineSeries({ color: 'rgba(255,255,255,0.4)', lineWidth: 1, title: 'SMA 21' });
      sma100Series = chart.addLineSeries({ color: 'rgba(245,158,11,0.4)', lineWidth: 1, title: 'SMA 100' });
      superTrendSeries = chart.addLineSeries({ color: 'rgba(34,197,94,0.3)', lineWidth: 1, lineStyle: 2 });
  }

  try {
      const res = await fetch(`/api/market/klines?symbol=${symbol}.P&interval=30&limit=300`);
      if (res.ok) {
          const data = await res.json();
          const formatted = data.map(d => ({
              time: d[0] / 1000,
              open: parseFloat(d[1]), high: parseFloat(d[2]), low: parseFloat(d[3]), close: parseFloat(d[4]), volume: parseFloat(d[5])
          }));
          
          const st = calculateSuperTrend(formatted, 10, 3);
          const sma21 = calculateSMA(formatted, 21);
          
          candlestickSeries.setData(formatted);
          volumeSeries.setData(formatted.map(d => ({ time: d.time, value: d.volume, color: d.close >= d.open ? 'rgba(34,197,94,0.15)' : 'rgba(239,68,68,0.15)' })));
          sma21Series.setData(sma21);
          sma100Series.setData(calculateSMA(formatted, 100));
          superTrendSeries.setData(st.filter(s=>s!==null).map(s=>({time:s.time, value:s.value})));

          // Ghost Entry Logic: Mark perfect points
          const markers = [];
          for (let i = 5; i < formatted.length; i++) {
              const c = formatted[i], p = formatted[i-1];
              const cST = st[i], pST = st[i-1];
              if(!cST || !pST) continue;

              // Entradas Perfeitas (Cruzamento de SuperTrend com Preço acima da SMA 21)
              if (cST.trend === 1 && pST.trend === -1) {
                  const currentSma = sma21.find(s => s.time === c.time);
                  if (currentSma && c.close > currentSma.value) {
                      markers.push({ time: c.time, position: 'belowBar', color: '#22c55e', shape: 'arrowUp', text: 'PERFECT LONG' });
                  }
              }
              // Sinais de Rejeição / Exaustão
              if (cST.trend === -1 && pST.trend === 1) {
                  markers.push({ time: c.time, position: 'aboveBar', color: '#f59e0b', shape: 'arrowDown', text: 'REJECTION' });
              }
          }
          candlestickSeries.setMarkers(markers);

          // Telemetry Updates
          document.getElementById('telRsi').textContent = calculateRSI(formatted).toFixed(1);
          document.getElementById('telTrend').textContent = st[st.length-1].trend === 1 ? 'BULLISH' : 'BEARISH';
          document.getElementById('telTrend').style.color = st[st.length-1].trend === 1 ? 'var(--green)' : 'var(--red)';
          document.getElementById('telAdx').textContent = (20 + Math.random()*25).toFixed(1); // Placeholder for real ADX

          chart.timeScale().fitContent();
      }
  } catch (e) { console.error("Engine Error:", e); }
  hideLoading();
}

function showLoading(txt){ document.getElementById('loading').classList.remove('hidden'); document.getElementById('loadingTxt').textContent = txt; }
function hideLoading(){ document.getElementById('loading').classList.add('hidden'); }

function renderList(syms){
  const el = document.getElementById('pairList'); el.innerHTML='';
  syms.forEach(s=>{
    const d=MATRIX[s]; if(!d) return;
    const bc=d.p==='EXTREME'?'bx':d.p==='VOLATILE'?'bv':'bs';
    const div=document.createElement('div');
    div.className='pair-item'+(s===cur?' active':'');
    div.id='p-'+s; div.onclick=()=>select(s);
    div.innerHTML=`<span class="pair-name">${s.replace('USDT','')}</span><span class="badge ${bc}">${d.p.substring(0,3)}</span>`;
    el.appendChild(div);
  });
}

function filterPairs(q){
  const u=q.toUpperCase().replace('USDT','');
  const f=Object.keys(MATRIX).filter(s=>s.includes(u));
  renderList(f);
  if(cur){ const e=document.getElementById('p-'+cur); if(e)e.classList.add('active'); }
}

async function capture(){
  if(!cur) return;
  const btn=document.getElementById('capBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="material-icons-round" style="animation:spin .7s linear infinite;display:inline-block">refresh</span> PROCESSANDO...';
  try{
    const r=await fetch('/api/vision/capture',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({symbol:cur,interval:'30'})});
    if(r.ok){
      const data=await r.json();
      document.getElementById('infoVision').textContent = (data.decision||'OK') + ' ('+ (data.confidence||100) +'%)';
      document.getElementById('infoVision').style.color = data.decision==='APPROVED'?'var(--green)':'var(--red)';
    }
  } catch(e){ document.getElementById('infoVision').textContent='ERROR'; }
  setTimeout(()=>{ btn.disabled=false; btn.innerHTML='<span class="material-icons-round">photo_camera</span>Capturar Visão'; },3000);
}

init();
</script>
</body>
</html>
