<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Observatory — 10D Sniper Elite 40</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#050505;--border:rgba(255,255,255,0.07);--bh:rgba(255,255,255,0.15);--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--t1:#fff;--t2:#9ca3af;--t3:#4b5563}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'Inter',sans-serif;overflow:hidden}
.layout{display:grid;grid-template-columns:200px 1fr;height:100vh}

.sidebar{background:rgba(0,0,0,0.8);border-right:1px solid var(--border);display:flex;flex-direction:column;backdrop-filter:blur(20px)}
.sb-head{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.sb-logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:28px;height:28px;border-radius:8px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.25);display:flex;align-items:center;justify-content:center}
.logo-icon .material-icons-round{font-size:14px;color:var(--green)}
.logo-t{font-size:10px;font-weight:900;letter-spacing:.2em;text-transform:uppercase}
.logo-s{font-size:7px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.sb-search{position:relative}
.sb-search input{width:100%;padding:6px 8px 6px 26px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:7px;color:var(--t1);font-size:10px;font-family:'JetBrains Mono',monospace;outline:none;transition:.2s}
.sb-search input:focus{border-color:var(--bh)}
.sb-search .material-icons-round{position:absolute;left:6px;top:50%;transform:translateY(-50%);font-size:12px;color:var(--t3)}
.pair-list{flex:1;overflow-y:auto;padding:4px}
.pair-list::-webkit-scrollbar{width:2px}
.pair-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
.pair-item{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:7px;cursor:pointer;transition:.15s;margin-bottom:1px;border:1px solid transparent}
.pair-item:hover{background:rgba(255,255,255,0.04);border-color:var(--border)}
.pair-item.active{background:rgba(34,197,94,0.08);border-color:rgba(34,197,94,0.25)}
.pair-name{font-size:10px;font-weight:700;font-family:'JetBrains Mono',monospace}
.badge{font-size:7px;font-weight:800;padding:2px 4px;border-radius:3px;text-transform:uppercase}
.bx{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.2)}
.bv{background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.2)}
.bs{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.15)}
.sb-foot{padding:8px 12px;border-top:1px solid var(--border)}
.status-dot{display:flex;align-items:center;gap:5px;font-size:8px;color:var(--t3);font-family:'JetBrains Mono',monospace}
.dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.main{display:flex;flex-direction:column;overflow:hidden}
.topbar{height:48px;background:rgba(0,0,0,0.7);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;backdrop-filter:blur(20px)}
.sym{font-size:14px;font-weight:900;font-family:'JetBrains Mono',monospace}
.tf-badge{font-size:8px;font-weight:800;padding:2px 7px;border-radius:5px;background:rgba(34,197,94,0.1);color:var(--green);border:1px solid rgba(34,197,94,0.2);text-transform:uppercase;letter-spacing:.1em;margin-left:8px}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--t2);cursor:pointer;font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;transition:.15s;font-family:'Inter',sans-serif}
.btn:hover{background:rgba(255,255,255,0.07);border-color:var(--bh);color:var(--t1)}
.btn .material-icons-round{font-size:12px}
.btn-green{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.25);color:var(--green)}
.btn-green:hover{background:rgba(34,197,94,0.2)}

.chart-area{flex:1;position:relative;overflow:hidden;background:#050505}
#tv_chart_container{position:absolute;top:0;left:0;right:0;bottom:0}

.loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--bg);z-index:10;transition:opacity .5s}
.loading.hidden{opacity:0;pointer-events:none}
.spinner{width:28px;height:28px;border:2px solid rgba(255,255,255,0.06);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace}

.infobar{height:36px;background:rgba(0,0,0,0.6);border-top:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:16px;flex-shrink:0}
.info-item{display:flex;align-items:center;gap:4px}
.info-label{font-size:7px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.info-val{font-size:9px;font-weight:700;font-family:'JetBrains Mono',monospace}
.sep{width:1px;height:12px;background:var(--border)}
.scan-line{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(34,197,94,0.25),transparent);animation:scan 5s ease-in-out infinite;pointer-events:none;z-index:5}
@keyframes scan{0%{top:0;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sb-head">
      <div class="sb-logo">
        <div class="logo-icon"><span class="material-icons-round">satellite_alt</span></div>
        <div><div class="logo-t">Observatory</div><div class="logo-s">Elite 40 Pairs</div></div>
      </div>
      <div class="sb-search">
        <span class="material-icons-round">search</span>
        <input type="text" id="searchInput" placeholder="Filtrar..." oninput="filterPairs(this.value)">
      </div>
    </div>
    <div class="pair-list" id="pairList"></div>
    <div class="sb-foot">
      <div class="status-dot"><div class="dot"></div><span id="statusTxt">40 pares monitorados</span></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center">
        <span class="sym" id="symDisplay">AVAXUSDT</span>
        <span class="tf-badge">30M · Perpetual</span>
        <span id="profBadge" class="badge bx" style="margin-left:8px">EXT</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-green" onclick="capture()" id="capBtn">
          <span class="material-icons-round">photo_camera</span>Capturar Visão
        </button>
      </div>
    </div>

    <div class="chart-area">
      <div class="scan-line"></div>
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div class="loading-txt" id="loadingTxt">Carregando gráfico...</div>
      </div>
      <div id="tv_chart_container"></div>
    </div>

    <div class="infobar">
      <div class="info-item"><span class="info-label">Par</span><span class="info-val" id="infoSym">—</span></div>
      <div class="sep"></div>
      <div class="info-item"><span class="info-label">Perfil</span><span class="info-val" id="infoPerfil">—</span></div>
      <div class="sep"></div>
      <div class="info-item"><span class="info-label">Respiro ROI</span><span class="info-val" id="infoRespiro">—</span></div>
      <div class="sep"></div>
      <div class="info-item"><span class="info-label">RF Delay</span><span class="info-val" id="infoRf">—</span></div>
      <div class="sep"></div>
      <div class="info-item"><span class="info-label">Visão</span><span class="info-val" id="infoVision" style="color:var(--t3)">Aguardando</span></div>
    </div>
  </main>
</div>

<!-- TradingView Widget Script -->
<script src="https://s3.tradingview.com/tv.js"></script>
<script>
const MATRIX = {
  "AVAXUSDT":{r:25,d:1.4,p:"EXTREME"},"NEARUSDT":{r:22,d:1.3,p:"VOLATILE"},
  "APTUSDT":{r:25,d:1.4,p:"EXTREME"},"SUIUSDT":{r:25,d:1.4,p:"EXTREME"},
  "OPUSDT":{r:22,d:1.3,p:"VOLATILE"},"ARBUSDT":{r:20,d:1.2,p:"VOLATILE"},
  "RENDERUSDT":{r:25,d:1.5,p:"EXTREME"},"FETUSDT":{r:25,d:1.5,p:"EXTREME"},
  "INJUSDT":{r:22,d:1.3,p:"VOLATILE"},"TIAUSDT":{r:25,d:1.4,p:"EXTREME"},
  "LINKUSDT":{r:15,d:1.0,p:"STABLE"},"DOTUSDT":{r:12,d:1.0,p:"STABLE"},
  "ADAUSDT":{r:10,d:1.0,p:"STABLE"},"POLUSDT":{r:15,d:1.1,p:"STABLE"},
  "ATOMUSDT":{r:15,d:1.0,p:"STABLE"},"LTCUSDT":{r:10,d:1.0,p:"STABLE"},
  "BCHUSDT":{r:18,d:1.2,p:"VOLATILE"},"XLMUSDT":{r:10,d:1.0,p:"STABLE"},
  "XRPUSDT":{r:10,d:1.0,p:"STABLE"},"TRXUSDT":{r:8,d:1.0,p:"STABLE"},
  "ALGOUSDT":{r:10,d:1.0,p:"STABLE"},"ETCUSDT":{r:12,d:1.1,p:"STABLE"},
  "FILUSDT":{r:18,d:1.2,p:"VOLATILE"},"STXUSDT":{r:22,d:1.3,p:"VOLATILE"},
  "ICPUSDT":{r:20,d:1.2,p:"VOLATILE"},"HBARUSDT":{r:15,d:1.1,p:"STABLE"},
  "KASUSDT":{r:25,d:1.4,p:"EXTREME"},"LDOUSDT":{r:20,d:1.2,p:"VOLATILE"},
  "AAVEUSDT":{r:18,d:1.2,p:"VOLATILE"},"RUNEUSDT":{r:25,d:1.4,p:"EXTREME"},
  "GRTUSDT":{r:20,d:1.2,p:"VOLATILE"},"EGLDUSDT":{r:15,d:1.1,p:"STABLE"},
  "SANDUSDT":{r:18,d:1.2,p:"VOLATILE"},"MANAUSDT":{r:18,d:1.2,p:"VOLATILE"},
  "THETAUSDT":{r:15,d:1.1,p:"STABLE"},"VETUSDT":{r:12,d:1.0,p:"STABLE"},
  "EOSUSDT":{r:10,d:1.0,p:"STABLE"},"CHZUSDT":{r:15,d:1.1,p:"STABLE"},
  "FTMUSDT":{r:22,d:1.3,p:"VOLATILE"},"UNIUSDT":{r:15,d:1.1,p:"STABLE"}
};

let cur = null;
let tvWidget = null;

function init(){
  const p = new URLSearchParams(location.search);
  const s = p.get('symbol')||p.get('s');
  renderList(Object.keys(MATRIX));
  select(s ? s.toUpperCase().replace('.P','') : 'AVAXUSDT');
}

function renderList(syms){
  const el = document.getElementById('pairList');
  el.innerHTML='';
  syms.forEach(s=>{
    const d=MATRIX[s]; if(!d) return;
    const bc=d.p==='EXTREME'?'bx':d.p==='VOLATILE'?'bv':'bs';
    const div=document.createElement('div');
    div.className='pair-item'+(s===cur?' active':'');
    div.id='p-'+s; div.onclick=()=>select(s);
    div.innerHTML=`<span class="pair-name">${s.replace('USDT','')}</span><span class="badge ${bc}">${d.p.substring(0,3)}</span>`;
    el.appendChild(div);
  });
}

function select(s){
  if(cur){ const e=document.getElementById('p-'+cur); if(e)e.classList.remove('active'); }
  cur=s;
  const d=MATRIX[s]||{r:10,d:1.0,p:'STABLE'};
  const e=document.getElementById('p-'+s); if(e)e.classList.add('active');
  const bc=d.p==='EXTREME'?'bx':d.p==='VOLATILE'?'bv':'bs';
  document.getElementById('symDisplay').textContent=s;
  const pb=document.getElementById('profBadge');
  pb.className='badge '+bc; pb.textContent=d.p.substring(0,3);
  document.getElementById('infoSym').textContent=s;
  document.getElementById('infoPerfil').textContent=d.p;
  document.getElementById('infoRespiro').textContent=d.r+'% ROI';
  document.getElementById('infoRf').textContent=d.d+'x';
  document.getElementById('infoVision').textContent='Aguardando';
  document.getElementById('infoVision').style.color='var(--t3)';
  loadChart(s);
}

function showLoading(txt){
  const l=document.getElementById('loading');
  document.getElementById('loadingTxt').textContent=txt||'Carregando...';
  l.classList.remove('hidden');
}

function hideLoading(){
  document.getElementById('loading').classList.add('hidden');
}

function loadChart(symbol){
  showLoading('Sincronizando ' + symbol + '...');

  const container = document.getElementById('tv_chart_container');
  container.innerHTML = '';
  
  // V5.0: Agora usa o Layout Salvo do Usuário (gXpimIZU)
  // Isso traz Supertrend, SMAs Customizadas e Volume que foram configurados manualmente
  const chartId = "gXpimIZU";
  const iframe = document.createElement('iframe');
  iframe.style.width = '100%';
  iframe.style.height = '100%';
  iframe.style.border = 'none';
  
  // BYBIT:SYMBOL.P format
  const tvSymbol = "BYBIT:" + symbol.replace('.P', '').toUpperCase() + ".P";
  
  // URL para carregar o layout compartilhado com o símbolo dinâmico
  iframe.src = `https://www.tradingview.com/chart/${chartId}/?symbol=${tvSymbol}&interval=30&hidesidetoolbar=1&theme=dark`;
  
  iframe.onload = function() {
    setTimeout(hideLoading, 1500); // Um pouco mais de tempo para renderizar os indicadores
  };
  
  container.appendChild(iframe);
}

async function capture(){
  if(!cur) return;
  const btn=document.getElementById('capBtn');
  btn.disabled=true;
  btn.innerHTML='<span class="material-icons-round" style="animation:spin .7s linear infinite;display:inline-block">refresh</span> Capturando...';
  document.getElementById('infoVision').textContent='Capturando...';
  document.getElementById('infoVision').style.color='var(--amber)';
  try{
    const r=await fetch('/api/vision/capture',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({symbol:cur,interval:'30'})
    });
    if(r.ok){
      const data=await r.json();
      const dec=data.decision||'OK';
      document.getElementById('infoVision').textContent=dec+' ('+data.confidence+'%)';
      document.getElementById('infoVision').style.color=dec==='APPROVED'?'var(--green)':'var(--red)';
    } else {
      document.getElementById('infoVision').textContent='Erro na API';
      document.getElementById('infoVision').style.color='var(--red)';
    }
  } catch(e){
    document.getElementById('infoVision').textContent='Offline';
    document.getElementById('infoVision').style.color='var(--red)';
  }
  setTimeout(()=>{
    btn.disabled=false;
    btn.innerHTML='<span class="material-icons-round">photo_camera</span>Capturar Visão';
  },3000);
}

function filterPairs(q){
  const u=q.toUpperCase().replace('USDT','');
  const f=Object.keys(MATRIX).filter(s=>s.replace('USDT','').includes(u));
  renderList(f);
  if(cur){ const e=document.getElementById('p-'+cur); if(e)e.classList.add('active'); }
}

init();
</script>
</body>
</html>
