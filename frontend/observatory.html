<!DOCTYPE html>
<html lang="pt-BR" style="background-color: #000000;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#000000">
    <meta name="color-scheme" content="dark">
    <title>10D SNIPER - OBSERVATÓRIO V5.7 DUAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700;900&family=Material+Icons+Round" rel="stylesheet">
    <style>
:root {
    --bg: #000000;
    --card: #050505;
    --border: rgba(255,255,255,0.08);
    --green: #10b981;
    --red: #ef4444;
    --amber: #f59e0b;
    --t1: #ffffff;
    --t2: #94a3b8;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
html, body { background: #000000 !important; background-color: #000000 !important; color: var(--t1); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

/* Global HUD */
.global-hud {
    height: 40px;
    background: #000;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 15px;
    gap: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
}
.hud-item { display: flex; align-items: center; gap: 8px; }
.hud-label { color: var(--t2); text-transform: uppercase; }
.hud-val { color: var(--t1); font-weight: 700; }
.hud-sep { width: 1px; height: 16px; background: var(--border); }

.layout { display: flex; height: calc(100vh - 40px); }

/* Sidebar */
.sidebar {
    width: 260px;
    background: var(--card);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
}
.sb-search { padding: 15px; border-bottom: 1px solid var(--border); }
.sb-search input {
    width: 100%;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px 12px;
    color: #fff;
    font-size: 12px;
}
.pair-list { flex: 1; overflow-y: auto; padding: 5px; }
.pair-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2px;
    transition: 0.2s;
}
.pair-item:hover { background: rgba(255,255,255,0.03); }
.pair-item.active { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); }
.pair-name { font-weight: 600; font-size: 13px; }
.badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; font-weight: 800; text-transform: uppercase; }
.badge.bs { background: rgba(16,185,129,0.15); color: var(--green); }
.badge.bx { background: rgba(239,68,68,0.15); color: var(--red); }

/* Main Area */
.main { flex: 1; display: flex; flex-direction: column; position: relative; }
.pair-bar {
    height: 50px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
}
.sym-name { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }

/* Split View Structure */
.split-container {
    flex: 1;
    display: flex;
    background: var(--border);
    gap: 1px;
    overflow: hidden;
}
.chart-col {
    display: flex;
    flex-direction: column;
    background: var(--bg);
    gap: 1px;
    overflow: hidden;
    position: relative;
}
.col-30m { flex: 6; }
.col-4h { flex: 4; }
.col-4h.hidden { display: none; }

.pane { position: relative; background: var(--bg); min-height: 80px; }
.pane.price { flex: 5; }
.pane.aux { flex: 1; }

.pane-label {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    background: rgba(0,0,0,0.6);
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 800;
    color: var(--t2);
    text-transform: uppercase;
    pointer-events: none;
}

/* Floating Levels HUD */
.levels-hud {
    position: absolute;
    top: 36px;
    right: 6px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 3px;
    pointer-events: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    max-height: calc(100% - 50px);
    overflow: hidden;
}
.level-item {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,0,0,0.80);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 3px;
    padding: 2px 7px 2px 5px;
    backdrop-filter: blur(6px);
    white-space: nowrap;
}
.level-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.level-lbl { color: var(--t2); }
.level-val { color: var(--t1); }

/* Traffic Light */
.traffic-light { display: flex; gap: 4px; align-items: center; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border); }
.tl-dot { width: 10px; height: 10px; border-radius: 50%; opacity: 0.2; transition: 0.3s; }
.tl-dot.on { opacity: 1; box-shadow: 0 0 10px currentColor; }
.tl-red { background: var(--red); color: var(--red); }
.tl-yel { background: var(--amber); color: var(--amber); }
.tl-grn { background: var(--green); color: var(--green); }
.tl-lbl { font-size: 9px; color: var(--t2); font-weight: 800; margin-right: 4px; }

.btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--t2);
    padding: 6px 12px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
}
.btn:hover { border-color: var(--t2); color: #fff; }
.btn-green { background: var(--green); color: #000; border: none; }
.btn-green:hover { background: #059669; }

/* Premium Boot Loader */
.loading {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #000;
    z-index: 1000;
    transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.loading.hidden { opacity: 0; pointer-events: none; }
.boot-logo-container { position: relative; width: 220px; height: 220px; margin-bottom: 40px; display: flex; align-items: center; justify-content: center; }
.boot-logo { width: 120px; height: 120px; z-index: 10; filter: drop-shadow(0 0 30px rgba(16,185,129, 0.6)); animation: logo-pulse 2s infinite ease-in-out; }
.boot-ring { position: absolute; width: 100%; height: 100%; border: 1.5px solid rgba(16,185,129, 0.2); border-radius: 50%; animation: ring-expand 3s infinite linear; }
.boot-ring:nth-child(2) { animation-delay: 1s; }
.boot-ring:nth-child(3) { animation-delay: 2s; }
.boot-scanner { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: linear-gradient(to right, transparent, var(--green), transparent); box-shadow: 0 0 20px var(--green); animation: scan-vertical 2.5s infinite ease-in-out; z-index: 11; }
.candle-loader { width: 24px; height: 48px; border: 2px solid var(--t2); position: relative; margin-bottom: 20px; }
.candle-loader::before, .candle-loader::after { content: ''; position: absolute; left: 50%; transform: translateX(-50%); width: 2px; height: 12px; background: var(--t2); }
.candle-loader::before { top: -12px; }
.candle-loader::after { bottom: -12px; }
.candle-animate { animation: candle-move 1.5s infinite ease-in-out; }

@keyframes logo-pulse { 0%, 100% { transform: scale(1); opacity: 0.8; filter: drop-shadow(0 0 30px rgba(16,185,129, 0.6)); } 50% { transform: scale(1.15); opacity: 1; filter: drop-shadow(0 0 50px rgba(16,185,129, 0.9)); } }
@keyframes ring-expand { 0% { transform: scale(0.4); opacity: 0.9; } 100% { transform: scale(1.8); opacity: 0; } }
@keyframes candle-move { 0%, 100% { transform: translateY(0); border-color: var(--green); height: 48px; } 50% { transform: translateY(-15px); border-color: var(--red); height: 32px; } }
@keyframes scan-vertical { 0% { top: 0%; opacity: 0; } 10%, 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }

.loading-txt { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 900; color: #fff; letter-spacing: 0.3em; text-transform: uppercase; margin-top: 25px; text-shadow: 0 0 10px rgba(16,185,129, 0.5); }
.asset-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; margin-top: 30px; }
.asset-dot { width: 8px; height: 8px; background: rgba(255,255,255,0.08); border-radius: 2px; }
.asset-dot.active { background: var(--green); box-shadow: 0 0 12px var(--green); animation: dot-flicker 2s infinite; }
@keyframes dot-flicker { 0%, 100% { opacity: 0.2; } 50% { opacity: 1; transform: scale(1.2); } }
    </style>
</head>

<script src="vendor/lightweight-charts.standalone.production.js"></script>
<script>
const MATRIX = {
  "AVAXUSDT":{p:"EXTREME"},"NEARUSDT":{p:"VOLATILE"},"APTUSDT":{p:"EXTREME"},"SUIUSDT":{p:"EXTREME"},
  "OPUSDT":{p:"VOLATILE"},"ARBUSDT":{p:"VOLATILE"},"RENDERUSDT":{p:"EXTREME"},"FETUSDT":{p:"EXTREME"},
  "INJUSDT":{p:"VOLATILE"},"TIAUSDT":{p:"EXTREME"},"LINKUSDT":{p:"STABLE"},"DOTUSDT":{p:"STABLE"},
  "ADAUSDT":{p:"STABLE"},"POLUSDT":{p:"STABLE"},"ATOMUSDT":{p:"STABLE"},"LTCUSDT":{p:"STABLE"},
  "BCHUSDT":{p:"VOLATILE"},"XLMUSDT":{p:"STABLE"},"XRPUSDT":{p:"STABLE"},"TRXUSDT":{p:"STABLE"}
};

let cur = null;
let study30 = null;
let study4h = null;

let charts30 = { price: null, volume: null, rsi: null };
let series30 = { candle: null, sma21: null, sma100: null, st: null, vol: null, rsi: null };
let obLines30 = [];

let charts4h = { price: null };
let series4h = { candle: null, sma21: null, sma100: null, st: null };
let obLines4h = [];
let fvgLines4h = [];

let isSyncing = false;

const calculateSMA = (d, p) => { let s = []; for (let i = 0; i < d.length; i++) { if (i < p - 1) continue; let sum = 0; for (let j = 0; j < p; j++) sum += d[i - j].close; s.push({ time: d[i].time, value: sum / p }); } return s; };
const calculateRSI = (d, p = 14) => { let r = []; if (d.length < p) return r; let g = 0, l = 0; for (let i = 1; i <= p; i++) { let diff = d[i].close - d[i-1].close; if (diff > 0) g += diff; else l -= diff; } let ag = g/p, al = l/p; r.push({ time: d[p].time, value: 100 - (100/(1+ag/al)) }); for (let i = p + 1; i < d.length; i++) { let diff = d[i].close - d[i-1].close; ag = (ag * (p-1) + (diff > 0 ? diff : 0)) / p; al = (al * (p-1) + (diff < 0 ? -diff : 0)) / p; r.push({ time: d[i].time, value: 100 - (100/(1+ag/al)) }); } return r; };
const calculateST = (d, p, m) => { const tr = (c, pr) => !pr ? c.high - c.low : Math.max(c.high - c.low, Math.abs(c.high - pr.close), Math.abs(c.low - pr.close)); let trs = d.map((c, i) => tr(c, d[i-1])); let atrs = []; let sum = 0; for (let i = 0; i < d.length; i++) { if (i < p) { sum += trs[i]; if (i === p-1) atrs[i] = sum/p; else atrs[i] = null; continue; } atrs[i] = (atrs[i-1] * (p-1) + trs[i]) / p; } let st = []; let pU = null, pL = null, t = 1; for (let i = 0; i < d.length; i++) { if (!atrs[i]) continue; let src = (d[i].high + d[i].low) / 2, u = src + m*atrs[i], l = src - m*atrs[i]; if (pU !== null) { u = (u < pU || d[i-1].close > pU) ? u : pU; l = (l > pL || d[i-1].close < pL) ? l : pL; } if (i > 0 && st.length > 0) { if (t === 1 && d[i].close < l) t = -1; else if (t === -1 && d[i].close > u) t = 1; } st.push({ time: d[i].time, value: t === 1 ? l : u, trend: t }); pU = u; pL = l; } return st; };

async function syncBTC() {
  try {
    const r = await fetch('/api/system/state?v=' + Date.now());
    if (!r.ok) return;
    const d = await r.json();
    document.getElementById('btcP').textContent = (d.btc_price || 0).toLocaleString('en-US', {style:'currency', currency:'USD'});
    const v = d.btc_variation_1h || 0;
    document.getElementById('btcV').textContent = (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
    document.getElementById('btcV').style.color = v >= 0 ? 'var(--green)' : 'var(--red)';
    document.getElementById('btcm').textContent = (d.btc_direction || 'LATERAL');
    document.getElementById('btcm').style.color = d.btc_direction === 'UP' ? 'var(--green)' : d.btc_direction === 'DOWN' ? 'var(--red)' : 'var(--t2)';
  } catch(e) {}
}

function initCharts() {
  const common = {
    layout: { background: { color: '#000000' }, textColor: '#94a3b8', fontFamily: 'Inter', fontSize: 11 },
    grid: { vertLines: { color: 'rgba(255,255,255,0.02)' }, horzLines: { color: 'rgba(255,255,255,0.02)' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    timeScale: { borderColor: 'rgba(255,255,255,0.08)', timeVisible: true, rightOffset: 12 },
    rightPriceScale: { minimumWidth: 72, borderVisible: false, scaleMargins: { top: 0.22, bottom: 0.22 } },
  };

  // 30M
  charts30.price = LightweightCharts.createChart(document.getElementById('chart30-price'), { ...common, timeScale: { ...common.timeScale, visible: false } });
  charts30.volume = LightweightCharts.createChart(document.getElementById('chart30-vol'), { ...common, timeScale: { ...common.timeScale, visible: false } });
  charts30.rsi = LightweightCharts.createChart(document.getElementById('chart30-rsi'), common);
  
  series30.candle = charts30.price.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false, wickUpColor: '#10b981', wickDownColor: '#ef4444' });
  series30.sma21 = charts30.price.addLineSeries({ color: 'rgba(255,255,255,0.5)', lineWidth: 1, lastValueVisible: false, priceLineVisible: false });
  series30.sma100 = charts30.price.addLineSeries({ color: 'rgba(245,158,11,0.5)', lineWidth: 1, lastValueVisible: false, priceLineVisible: false });
  series30.st = charts30.price.addLineSeries({ color: 'rgba(16,185,129,0.3)', lineWidth: 1, lineStyle: 2, lastValueVisible: false, priceLineVisible: false });
  series30.vol = charts30.volume.addHistogramSeries({ color: 'rgba(38,166,154,0.5)', priceFormat: { type: 'volume' } });
  series30.rsi = charts30.rsi.addLineSeries({ color: '#8b5cf6', lineWidth: 2 });
  charts30.rsi.addLineSeries({ color: 'rgba(255,255,255,0.1)', lineWidth: 1, lineStyle: 2 }).setData([{time:0, value:70},{time:9999999999, value:70}]);
  charts30.rsi.addLineSeries({ color: 'rgba(255,255,255,0.1)', lineWidth: 1, lineStyle: 2 }).setData([{time:0, value:30},{time:9999999999, value:30}]);

  // 4H
  charts4h.price = LightweightCharts.createChart(document.getElementById('chart4h-price'), common);
  series4h.candle = charts4h.price.addCandlestickSeries({ upColor: '#10b981', downColor: '#ef4444', borderVisible: false, wickUpColor: '#10b981', wickDownColor: '#ef4444' });
  series4h.sma21 = charts4h.price.addLineSeries({ color: 'rgba(255,255,255,0.5)', lineWidth: 1, lastValueVisible: false, priceLineVisible: false });
  series4h.sma100 = charts4h.price.addLineSeries({ color: 'rgba(245,158,11,0.5)', lineWidth: 2, lastValueVisible: false, priceLineVisible: false });
  series4h.st = charts4h.price.addLineSeries({ color: 'rgba(16,185,129,0.3)', lineWidth: 1, lineStyle: 2, lastValueVisible: false, priceLineVisible: false });

  // Sync 30m only (vertical)
  const sync30 = (src, r) => { if (!r || isSyncing) return; isSyncing = true; Object.values(charts30).forEach(c => { if(c && c !== src) try { c.timeScale().setVisibleRange(r); } catch(e){} }); isSyncing = false; };
  charts30.price.timeScale().subscribeVisibleTimeRangeChange(r => sync30(charts30.price, r));
  charts30.volume.timeScale().subscribeVisibleTimeRangeChange(r => sync30(charts30.volume, r));
  charts30.rsi.timeScale().subscribeVisibleTimeRangeChange(r => sync30(charts30.rsi, r));
}

function updateTrafficLight(trend30, trend4h) {
    document.getElementById('tl-r').classList.remove('on');
    document.getElementById('tl-y').classList.remove('on');
    document.getElementById('tl-g').classList.remove('on');
    
    if (trend30 === trend4h) {
        document.getElementById('tl-g').classList.add('on'); // Alinhado
    } else {
        document.getElementById('tl-y').classList.add('on'); // Conflito
    }
}

async function loadData(s) {
  document.getElementById('loading').classList.remove('hidden');
  try {
    const [res30, res4h] = await Promise.all([
      fetch(`/api/market/study?symbol=${s}.P&interval=30&limit=400&v=` + Date.now()),
      fetch(`/api/market/study?symbol=${s}.P&interval=240&limit=400&v=` + Date.now())
    ]);
    
    let lastTrend30 = 0;
    let lastTrend4h = 0;

    if (res30.ok) {
        study30 = await res30.json();
        const d30 = study30.klines.map(x => ({ time: x[0]/1000, open: x[1], high: x[2], low: x[3], close: x[4], volume: x[5] }));
        series30.candle.setData(d30);
        series30.vol.setData(d30.map(x => ({ time: x.time, value: x.volume, color: x.close >= x.open ? 'rgba(16,185,129,0.3)' : 'rgba(239,68,68,0.3)' })));
        series30.rsi.setData(calculateRSI(d30));
        
        series30.sma21.setData(calculateSMA(d30, 21));
        series30.sma100.setData(calculateSMA(d30, 100));
        const st30 = calculateST(d30, 10, 3);
        series30.st.setData(st30.map(x => ({ time: x.time, value: x.value })));
        if(st30.length > 0) lastTrend30 = st30[st30.length-1].trend;
    }

    if (res4h.ok) {
        study4h = await res4h.json();
        const d4h = study4h.klines.map(x => ({ time: x[0]/1000, open: x[1], high: x[2], low: x[3], close: x[4], volume: x[5] }));
        series4h.candle.setData(d4h);
        
        series4h.sma21.setData(calculateSMA(d4h, 21));
        series4h.sma100.setData(calculateSMA(d4h, 100));
        const st4h = calculateST(d4h, 10, 3);
        series4h.st.setData(st4h.map(x => ({ time: x.time, value: x.value })));
        if(st4h.length > 0) lastTrend4h = st4h[st4h.length-1].trend;
    }
    
    updateTrafficLight(lastTrend30, lastTrend4h);
    refreshAllLayers();
    
    Object.values(charts30).forEach(c => { const p = c.chartElement().parentElement; if(p) c.applyOptions({ width: p.clientWidth, height: p.clientHeight }); });
    charts4h.price.applyOptions({ width: document.getElementById('p4h-pane').clientWidth, height: document.getElementById('p4h-pane').clientHeight });
    
  } catch(e) { console.error("Data Load Error:", e); }
  
  setTimeout(() => { document.getElementById('loading').classList.add('hidden'); }, 500);
}

function processLayers(study, seriesGroup, obArr, fvgArr, is4H) {
    if (!study || !study.klines) return [];
    const d = study.klines.map(x => ({ time: x[0]/1000, open: x[1], high: x[2], low: x[3], close: x[4] }));
    let m = [];
    const levelItems = [];
    
    obArr.forEach(l => seriesGroup.candle.removePriceLine(l));
    obArr.length = 0;
    
    // FVGs / OBs
    if (document.getElementById('toggle-smc').checked) {
        // Render OBs
        (study.obs || []).slice(-3).forEach(ob => {
            const color = ob.type === 'BULLISH' ? '#10b981' : '#ef4444';
            obArr.push(seriesGroup.candle.createPriceLine({ price: ob.top, color: color + '55', lineWidth: is4H ? 2 : 1, axisLabelVisible: false }));
            obArr.push(seriesGroup.candle.createPriceLine({ price: ob.bottom, color: color + '33', lineWidth: 1, lineStyle: 2, axisLabelVisible: false }));
            levelItems.push({ color, label: 'OB ' + ob.type[0], value: ob.top });
        });
        
        // Render FVGs
        if (fvgArr && study.fvgs) {
            fvgArr.forEach(l => seriesGroup.candle.removePriceLine(l));
            fvgArr.length = 0;
            study.fvgs.slice(-2).forEach(fvg => {
                const color = fvg.type === 'BULLISH' ? 'rgba(16,185,129,0.1)' : 'rgba(239,68,68,0.1)';
                // In lightweight charts, box drawing is complex. We use distinct thick dashed lines for FVG boundaries
                fvgArr.push(seriesGroup.candle.createPriceLine({ price: fvg.top, color: fvg.type === 'BULLISH' ? '#10b981' : '#ef4444', lineWidth: 2, lineStyle: 3, axisLabelVisible: false }));
                fvgArr.push(seriesGroup.candle.createPriceLine({ price: fvg.bottom, color: fvg.type === 'BULLISH' ? '#10b981' : '#ef4444', lineWidth: 2, lineStyle: 3, axisLabelVisible: false }));
                levelItems.push({ color: '#f59e0b', label: 'FVG ' + fvg.type[0], value: (fvg.top+fvg.bottom)/2 });
            });
        }
    }

    // 1-2-3 Patterns
    if (!is4H && document.getElementById('toggle-123').checked && (study.patterns_123 || []).length > 0) {
        study.patterns_123.forEach(p => {
            const color = p.side === 'buy' ? '#10b981' : '#ef4444';
            Object.entries(p.points).forEach(([num, data]) => {
                const t = d[data.idx]?.time;
                if (t) m.push({ time: t, position: p.side === 'buy' ? 'belowBar' : 'aboveBar', color, shape: 'circle', text: num });
            });
            if (p.trigger_price) {
                obArr.push(seriesGroup.candle.createPriceLine({ price: p.trigger_price, color: 'rgba(255,255,255,0.25)', lineWidth: 1, lineStyle: 3, axisLabelVisible: false }));
                levelItems.push({ color: '#94a3b8', label: 'STRIKE', value: p.trigger_price });
            }
        });
    }

    // Trend
    if (document.getElementById('toggle-trend').checked) {
        const st = calculateST(d, 10, 3);
        for (let i = 1; i < st.length; i++) {
            if (st[i].trend === 1 && st[i-1].trend === -1) m.push({ time: st[i].time, position: 'belowBar', color: '#10b981', shape: 'arrowUp', text: 'ST+' });
            if (st[i].trend === -1 && st[i-1].trend === 1) m.push({ time: st[i].time, position: 'aboveBar', color: '#f59e0b', shape: 'arrowDown', text: 'ST-' });
        }
        seriesGroup.sma21.applyOptions({ visible: true });
        seriesGroup.sma100.applyOptions({ visible: true });
        seriesGroup.st.applyOptions({ visible: true });
        
        const sma21d = calculateSMA(d, 21);
        const sma100d = calculateSMA(d, 100);
        if (sma21d.length) levelItems.push({ color: 'rgba(255,255,255,0.7)', label: 'SMA21', value: sma21d[sma21d.length-1].value });
        if (sma100d.length) levelItems.push({ color: '#f59e0b', label: 'SMA100', value: sma100d[sma100d.length-1].value });
    } else {
        seriesGroup.sma21.applyOptions({ visible: false });
        seriesGroup.sma100.applyOptions({ visible: false });
        seriesGroup.st.applyOptions({ visible: false });
    }

    seriesGroup.candle.setMarkers(m.sort((a,b) => a.time - b.time));
    return levelItems;
}

function updateHud(hudId, levelItems) {
  const hud = document.getElementById(hudId);
  if (!hud) return;
  const deduped = [];
  levelItems.sort((a,b) => b.value - a.value).forEach(item => {
    const dup = deduped.some(x => Math.abs(x.value - item.value) / item.value < 0.015);
    if (!dup) deduped.push(item);
  });
  hud.innerHTML = deduped.slice(0, 8).map(item => {
    const decimals = item.value > 100 ? 2 : item.value > 1 ? 4 : 6;
    return `<div class="level-item"><div class="level-dot" style="background:${item.color}"></div><span class="level-lbl">${item.label}</span><span class="level-val">${item.value.toFixed(decimals)}</span></div>`;
  }).join('');
}

function refreshAllLayers() {
    const items30 = processLayers(study30, series30, obLines30, null, false);
    updateHud('hud30', items30);
    
    if(!document.getElementById('col4h').classList.contains('hidden')) {
        const items4h = processLayers(study4h, series4h, obLines4h, fvgLines4h, true);
        updateHud('hud4h', items4h);
    }
}

function select(s) {
  if (cur) document.getElementById('p-'+cur)?.classList.remove('active');
  cur = s; document.getElementById('p-'+s)?.classList.add('active');
  document.getElementById('symDisplay').textContent = s;
  const d = MATRIX[s] || {p:'STABLE'};
  document.getElementById('profBadge').className = 'badge ' + (d.p === 'EXTREME' ? 'bx' : 'bs');
  document.getElementById('profBadge').textContent = d.p;
  loadData(s);
}

function renderPairs(list) {
  const el = document.getElementById('pairList'); el.innerHTML = '';
  list.forEach(s => {
    const div = document.createElement('div'); div.className = 'pair-item' + (s === cur ? ' active' : '');
    div.id = 'p-'+s; div.onclick = () => select(s);
    div.innerHTML = `<span class="pair-name">${s.replace('USDT','')}</span><span class="badge ${MATRIX[s].p === 'EXTREME' ? 'bx' : 'bs'}">${MATRIX[s].p.substring(0,3)}</span>`;
    el.appendChild(div);
  });
}

function filterPairs(q) { renderPairs(Object.keys(MATRIX).filter(s => s.includes(q.toUpperCase()))); }
